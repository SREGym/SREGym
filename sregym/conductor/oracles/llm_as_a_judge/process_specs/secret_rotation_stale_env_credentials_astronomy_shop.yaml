problem_id: secret_rotation_stale_env_credentials_astronomy_shop
fault_summary: >-
  The PostgreSQL credentials used by the product-catalog service in the
  astronomy-shop namespace are rotated: the database password is changed and
  the Kubernetes Secret is updated with the new value. The product-catalog
  pod, however, sourced its credentials from the Secret via environment
  variables that were captured at pod-start time. The running pod retains the
  old, now-invalid password and every database connection attempt fails with
  an authentication error. The pod remains Running but all product-catalog
  functionality that requires database access is broken.

root_cause:
  resource: "Deployment/product-catalog (stale env credentials from Secret)"
  mechanism: >-
    Kubernetes injects Secret values into pod environment variables once, at
    container start. When the Secret is updated the running container is not
    restarted and continues to use the stale credentials. The DB session is
    rejected with password authentication failed. A pod restart is required
    to pick up the new Secret values; alternatively the application must
    source credentials dynamically at runtime.

causal_chain:
  - id: symptom
    component: "Deployment/product-catalog (DB operations failing)"
    description: >-
      The agent observes product-catalog database operations failing. The pod
      stays Running, so the discriminative symptom is the connection/auth
      failure itself, not the product-catalog service name (which appears in
      every healthy get-pods output).
    signals:
      - field: result
        pattern: "password authentication failed|connection refused"

  - id: intermediate_auth_failure
    component: "product-catalog pod logs — postgres rejects the password"
    description: >-
      The agent reads product-catalog logs and finds the postgres driver's
      specific authentication rejection (FATAL / pq: password authentication
      failed), confirming the supplied password is wrong rather than the
      database being unreachable.
    signals:
      - field: result
        pattern: "FATAL:? +password|pq: password authentication failed"

  - id: root_cause
    component: "Deployment/product-catalog env — DB_CONNECTION_STRING sourced from rotated Secret"
    description: >-
      The agent traces DB_CONNECTION_STRING in the running pod to the
      product-catalog-db-conn Secret via secretKeyRef, establishing that the
      credential comes from a Secret that was rotated without restarting the
      pod. Requiring the env-to-secret linkage (not the bare Secret name)
      credits causal understanding over a structural listing of the Secret.
    signals:
      - field: result
        pattern: "product-catalog-db-conn.{0,30}DB_CONNECTION|DB_CONNECTION_STRING=product-catalog-db-conn|secretKeyRef.{0,60}product-catalog-db-conn"
