apiVersion: v1
kind: Pod
metadata:
  name: locust-fetcher
  labels:
    app: locust-fetcher
    job: workload
spec:
  containers:
  - name: fetcher
    image: python:3.12-slim
    command: ["python", "-u", "-c"]
    args:
      - |
        import json, os, time, urllib.request
        url = os.environ["LOCUST_URL"]
        interval = int(os.environ.get("INTERVAL_SECONDS", "10"))
        round_no = 0
        while True:
            print(f"Running Locust on round #{round_no}", flush=True)
            round_no += 1
            try:
                with urllib.request.urlopen(f"{url}/stats/requests", timeout=5) as r:
                    body = r.read().decode()
                try:
                    body = json.dumps(json.loads(body), separators=(",", ":"))
                except Exception:
                    pass
                print(body, flush=True)
                try:
                    urllib.request.urlopen(f"{url}/stats/reset", timeout=5).read()
                except Exception:
                    pass
            except Exception as e:
                print(json.dumps({"error": repr(e)}), flush=True)
            time.sleep(interval)
    env:
    - name: LOCUST_URL
      value: "http://load-generator:8089"
    - name: INTERVAL_SECONDS
      value: "10"
